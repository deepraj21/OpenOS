[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openos"
version = "0.0.1"
description = "Thin Python client for the OpenOS registry HTTP API (Phase 2)."
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "OpenOS contributors" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Typing :: Typed",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["openos"]

[tool.pytest.ini_options]
testpaths = ["tests"]
